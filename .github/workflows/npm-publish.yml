name: publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: version
        run: |
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            echo "No release tag found. Run the release workflow first."
            exit 1
          fi
          VERSION="${LATEST#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Check if version already published
        id: check
        run: |
          VERSION=${{ steps.version.outputs.version }}
          EXISTS=$(npm view @formseal/embed@${VERSION} version 2>/dev/null || echo "")
          if [ -n "$EXISTS" ]; then
            echo "Version ${VERSION} is already on npm. Nothing to publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Inject version and publish
        if: steps.check.outputs.skip == 'false'
        run: |
          node -e "
            const fs  = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait 30s then trigger socket badge update
        run: |
          sleep 30
          gh workflow run update-socket-badge.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}