name: update socket badge

on:
  schedule:
    - cron: "0 * * * *"  # every hour
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release tag
        id: tag
        run: |
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            echo "no release tags found"
            exit 1
          fi
          VERSION="${LATEST#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if badge is already up to date
        id: check
        run: |
          VERSION=${{ steps.tag.outputs.version }}
          if grep -q "badge.socket.dev/npm/package/@formseal/embed/${VERSION}" README.md; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
          fi

      - name: Update socket badge in README
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          VERSION=${{ steps.tag.outputs.version }}
          sed -i "s|badge.socket.dev/npm/package/@formseal/embed/[^\"]*|badge.socket.dev/npm/package/@formseal/embed/${VERSION}|g" README.md

      - name: Commit and push
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          VERSION=${{ steps.tag.outputs.version }}
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update socket badge to v${VERSION}"
          git push